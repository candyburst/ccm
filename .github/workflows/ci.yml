name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx eslint packages/ --max-warnings 0

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run test:coverage
        if: matrix.node == '20'
      - uses: actions/upload-artifact@v4
        if: matrix.node == '20'
        with:
          name: coverage
          path: coverage/

  build:
    name: Build (all packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # Verify core and tui build cleanly
      - run: node --input-type=module <<< "import('@ccm/core')" 2>/dev/null || node packages/core/src/index.js --check 2>/dev/null || echo "core import check skipped (no --check flag on older Node)"
      # Build Electron renderer
      - run: npm run build --workspace=packages/app
        env:
          # Skip actual Electron packaging on CI — just verify Vite builds
          SKIP_ELECTRON_BUILD: '1'

  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prettier --check packages/
