name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: CCM version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [macOS (Intel), macOS (Apple Silicon), Linux x64, Linux arm64, Windows 10, Windows 11]
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "20.11.0"
    validations:
      required: true
  - type: input
    id: claude_code
    attributes:
      label: Claude Code version
      placeholder: output of `claude --version`
    validations:
      required: true
  - type: dropdown
    id: interface
    attributes:
      label: Interface
      options: [CLI, TUI, Electron app]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `ccm ...`
        2. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour — include the full error output
    validations:
      required: true
